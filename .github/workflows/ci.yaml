name: build

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

env:
  VERSION_MAJOR: 9
  VERSION_MINOR: 10
  VERSION_PATCH: 0

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: derive version
        id: v
        shell: bash
        run: |
          BUILD=${{ github.run_number }}
          VERSION="${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_PATCH }}.${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: configure
        run: |
          cmake -S . -B build \
            -DWTL_INSTALL=ON \
            -DWTL_VERSION=${{ needs.version.outputs.version }}

      - name: install
        run: |
          cmake --install build --prefix install

      - name: verify installed package
        run: |
          mkdir -p smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(wtl_smoke LANGUAGES CXX)
          find_package(wtl CONFIG REQUIRED)
          add_library(consumer INTERFACE)
          target_link_libraries(consumer INTERFACE wtl::wtl)
          EOF
          cmake -S smoke -B smoke-build -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/install"

      - name: package
        run: |
          mkdir -p dist
          cd install
          cmake -E tar cf "${GITHUB_WORKSPACE}/dist/wtl-v${{ needs.version.outputs.version }}.zip" --format=zip -- .
          cd "${GITHUB_WORKSPACE}"
          ls -la dist

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wtl-dist
          path: dist/*
          if-no-files-found: error

  release:
    needs:
      - version
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wtl-dist
          path: dist

      - name: create release
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          tag_name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/*
