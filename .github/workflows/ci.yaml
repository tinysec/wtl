name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

env:
  WTL_VERSION: 10.01

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: derive version
        id: v
        shell: bash
        run: |
          VERSION="${WTL_VERSION}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match WTL_VERSION ${VERSION}"
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "WTL version: ${VERSION}"

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: configure
        run: |
          cmake -S . -B build \
            -DWTL_VERSION=${{ needs.version.outputs.version }}

      - name: verify local target
        run: |
          mkdir -p smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(wtl_smoke LANGUAGES CXX)
          include(FetchContent)
          FetchContent_Declare(
                  wtl
                  SOURCE_DIR "${CMAKE_CURRENT_LIST_DIR}/..")
          FetchContent_MakeAvailable(wtl)
          add_library(consumer INTERFACE)
          target_link_libraries(consumer INTERFACE wtl::wtl)
          EOF
          cmake -S smoke -B smoke-build
