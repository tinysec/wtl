name: build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"

env:
  WTL_VERSION: 10.01
  STABLE_TAG: v10.01

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: configure
        run: |
          cmake -S . -B build \
            -DWTL_VERSION=${WTL_VERSION}

      - name: verify local target
        run: |
          mkdir -p smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(wtl_smoke LANGUAGES CXX)
          include(FetchContent)
          FetchContent_Declare(
                  wtl
                  SOURCE_DIR "${CMAKE_CURRENT_LIST_DIR}/..")
          FetchContent_MakeAvailable(wtl)
          add_library(consumer INTERFACE)
          target_link_libraries(consumer INTERFACE wtl::wtl)
          EOF
          cmake -S smoke -B smoke-build

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: publish build release and stable tag
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_TAG: v10.01-build.${{ github.run_number }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${BUILD_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${BUILD_TAG}"

          gh release create "${BUILD_TAG}" \
            --title "${BUILD_TAG}" \
            --notes "Automated FetchContent-only WTL ${WTL_VERSION} build ${GITHUB_RUN_NUMBER}."

          gh release delete "${STABLE_TAG}" --yes || true
          git push origin ":refs/tags/${STABLE_TAG}" || true

          git tag -f "${STABLE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${STABLE_TAG}"
